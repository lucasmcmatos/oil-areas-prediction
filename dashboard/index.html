<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telemetria de Probabilidade de Petróleo — OBSAT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e13;
    --panel: #10151d;
    --border: #1e2733;
    --amber: #ff9f1c;
    --teal: #3adbc1;
    --red: #ff5a5a;
    --text: #d7dee6;
    --text-dim: #7c8a9a;
    --manual: #3adbc1;
    --satellite: #c084fc;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    height: 100vh;
    height: 100dvh;
  }

  #map { flex: 1; height: 100%; background: var(--bg); }

  #panel {
    width: 320px;
    flex-shrink: 0;
    padding: 14px 16px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Phones / narrow viewports: stack map above a scrollable control panel
     instead of a fixed side column, and enlarge touch targets. */
  @media (max-width: 768px) {
    body {
      flex-direction: column;
      overflow: auto;
    }

    #map {
      flex: none;
      height: 45vh;
      height: 45dvh;
      width: 100%;
    }

    #panel {
      width: 100%;
      flex: 1;
      border-left: none;
      border-top: 1px solid var(--border);
      overflow-y: visible;
    }

    button {
      padding: 12px;
      font-size: 0.9rem;
    }

    input[type="range"] {
      height: 28px;
    }

    input[type="number"] {
      padding: 8px 6px;
      font-size: 0.85rem;
    }
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem;
    margin: 0 0 3px;
    color: var(--amber);
    letter-spacing: 0.02em;
  }

  h1 span { color: var(--teal); }

  .subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0;
  }

  .header-block {
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .field label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }

  .field label .value { color: var(--teal); }

  .coords-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  input[type="range"] {
    accent-color: var(--amber);
    width: 100%;
  }

  input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    width: 100%;
  }

  button {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  button.primary {
    background: var(--amber);
    color: #14100a;
    border-color: var(--amber);
  }

  button.secondary {
    color: var(--teal);
    border-color: var(--teal);
  }

  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #result {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    min-height: 40px;
    white-space: pre-wrap;
    color: var(--text-dim);
  }

  #result.high { color: var(--red); border-color: var(--red); }
  #result.moderate { color: var(--amber); border-color: var(--amber); }
  #result.low { color: var(--teal); border-color: var(--teal); }

  .legend {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .legend .row { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.low { background: var(--teal); }
  .dot.moderate { background: var(--amber); }
  .dot.high { background: var(--red); }
  .dot.anchor { background: #9aa5b1; }

  #api-url {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
  }

  hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  .leaflet-tooltip {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
  }
  .leaflet-tooltip::before { display: none !important; }

  .sat-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 12px;
    background: var(--bg);
  }
  .sat-status-row {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .sat-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .sat-dot.connected { background: var(--satellite); }
  .sat-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0;
  }

  #history-box {
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }

  .history-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.64rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #history-list {
    overflow-y: auto;
    flex: 1;
  }

  .history-item {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    cursor: default;
  }
  .history-item:last-child { border-bottom: none; }

  .history-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 6px;
  }

  .history-source {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.61rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    flex-shrink: 0;
  }

  .history-prob {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
  }

  .history-coords {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .history-empty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.66rem;
    color: var(--text-dim);
    padding: 12px 10px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="header-block">
    <h1>OIL<span>SAT</span> // TELEMETRY</h1>
    <div class="subtitle">COSTA BRASILEIRA — LEVANTAMENTO DE METANO/PRESSÃO</div>
  </div>

  <div class="field">
    <label>METANO (ppm) <span class="value" id="methane-value">1.90</span></label>
    <input type="range" id="methane" min="1.7" max="2.6" step="0.01" value="1.90" />
  </div>

  <div class="field">
    <label>PRESSÃO (hPa) <span class="value" id="pressure-value">1013.0</span></label>
    <input type="range" id="pressure" min="1010" max="1020" step="0.1" value="1013.0" />
  </div>

  <div class="coords-row">
    <div class="field">
      <label>LATITUDE</label>
      <input type="number" id="latitude" step="0.0001" value="-25.20" />
    </div>
    <div class="field">
      <label>LONGITUDE</label>
      <input type="number" id="longitude" step="0.0001" value="-43.00" />
    </div>
  </div>

  <div class="subtitle">Clique no mapa para definir latitude/longitude.</div>

  <button class="primary" id="analyze-btn">ANALISAR PONTO</button>
  <button id="clear-btn">LIMPAR MARCADORES</button>

  <div id="result">Aguardando leitura&hellip;</div>

  <div id="history-box">
    <div class="history-header">HISTÓRICO DE LEITURAS</div>
    <div id="history-list">
      <div id="history-empty" class="history-empty">Nenhuma leitura ainda.</div>
    </div>
  </div>

  <div class="sat-status">
    <div class="sat-status-row">
      <span id="sat-dot" class="sat-dot"></span>
      <span id="sat-label">SATÉLITE: AGUARDANDO</span>
    </div>

    <hr class="sat-divider" />

    <div class="legend">
      <div class="row"><span class="dot low"></span> &lt; 30% — baixo</div>
      <div class="row"><span class="dot moderate"></span> 30–70% — moderado</div>
      <div class="row"><span class="dot high"></span> &gt; 70% — alto</div>
      <div class="row"><span class="dot anchor"></span> campo conhecido (referência)</div>
    </div>

    <hr class="sat-divider" />

    <div id="api-url">API: <span id="api-url-text"></span></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Same-origin: works from any host/IP the page was loaded from (laptop,
  // LAN IP for a phone on the same network, or a future public deployment).
  const API_BASE = window.location.origin;
  document.getElementById('api-url-text').textContent = API_BASE;

  const SOURCE_COLOR = { 'Manual': '#3adbc1', 'Satélite': '#c084fc' };
  const sourceColor = (source) => SOURCE_COLOR[source] ?? '#7c8a9a';

  const OIL_FIELD_ANCHORS = {
    'Tupi/Lula':           [-25.20, -43.00],
    'Búzios':              [-25.30, -43.50],
    'Sapinhoá':            [-25.00, -43.30],
    'Marlim':              [-22.50, -40.30],
    'Roncador':            [-22.05, -40.10],
    'Barracuda':           [-22.35, -40.10],
    'Albacora':            [-22.20, -40.30],
    'Jubarte':             [-20.60, -39.80],
    'Camarupim':           [-19.80, -39.50],
    'Camamu':              [-13.80, -38.80],
    'Sergipe-Alagoas':     [-10.50, -36.50],
    'Potiguar Offshore':   [ -4.00, -36.80],
    'Potiguar Onshore':    [ -5.10, -36.50],
    'Ceará':               [ -3.20, -38.50],
    'Barreirinhas':        [ -2.50, -42.50],
  };

  const map = L.map('map', { zoomControl: true }).setView([-23.5, -41.5], 7);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  for (const [name, [lat, lon]] of Object.entries(OIL_FIELD_ANCHORS)) {
    L.circleMarker([lat, lon], {
      radius: 5,
      color: '#9aa5b1',
      fillColor: '#9aa5b1',
      fillOpacity: 0.9,
    }).bindTooltip(name).addTo(map);
  }

  const methaneInput = document.getElementById('methane');
  const pressureInput = document.getElementById('pressure');
  const methaneValue = document.getElementById('methane-value');
  const pressureValue = document.getElementById('pressure-value');
  const latitudeInput = document.getElementById('latitude');
  const longitudeInput = document.getElementById('longitude');
  const resultBox = document.getElementById('result');

  methaneInput.addEventListener('input', () => {
    methaneValue.textContent = parseFloat(methaneInput.value).toFixed(2);
  });
  pressureInput.addEventListener('input', () => {
    pressureValue.textContent = parseFloat(pressureInput.value).toFixed(1);
  });

  const readingMarkers = [];
  const satelliteMarkers = [];
  let pendingMarker = null;

  map.on('click', (event) => {
    latitudeInput.value = event.latlng.lat.toFixed(4);
    longitudeInput.value = event.latlng.lng.toFixed(4);
    if (pendingMarker) map.removeLayer(pendingMarker);
    pendingMarker = L.circleMarker([event.latlng.lat, event.latlng.lng], {
      radius: 9,
      color: '#7c8a9a',
      fillColor: '#4a5568',
      fillOpacity: 0.5,
      weight: 2,
      dashArray: '5 5',
    }).bindTooltip('Aguardando análise…').addTo(map);
  });

  function colorForClassification(classification) {
    if (classification === 'high') return '#ff5a5a';
    if (classification === 'moderate') return '#ff9f1c';
    return '#3adbc1';
  }

  function classificationPt(classification) {
    if (classification === 'high') return 'ALTO';
    if (classification === 'moderate') return 'MODERADO';
    return 'BAIXO';
  }

  // Builds the rich HTML tooltip shared by manual and satellite markers.
  // fields: {latitude, longitude, methane_ppm, pressure_hpa, oil_probability_percent, classification}
  function buildTooltipHtml(fields, source) {
    const color = colorForClassification(fields.classification);
    return `
      <div style="background:#10151d;border:1px solid ${color};border-radius:5px;
                  padding:8px 11px;font-family:'IBM Plex Mono',monospace;
                  font-size:0.72rem;line-height:1.85;color:#d7dee6;min-width:200px;">
        <div style="color:${sourceColor(source)};font-size:0.67rem;font-weight:600;
                    letter-spacing:0.09em;border-bottom:1px solid #1e2733;
                    margin-bottom:5px;padding-bottom:4px;">
          ◈ ${source.toUpperCase()}
        </div>
        <div style="display:grid;grid-template-columns:1fr auto;gap:1px 10px;">
          <span style="color:#7c8a9a;">Metano (CH&#8324;)</span>
          <span>${fields.methane_ppm.toFixed(3)} ppm</span>
          <span style="color:#7c8a9a;">Press&atilde;o</span>
          <span>${fields.pressure_hpa.toFixed(1)} hPa</span>
          <span style="color:#7c8a9a;">Latitude</span>
          <span>${fields.latitude.toFixed(4)}&deg;</span>
          <span style="color:#7c8a9a;">Longitude</span>
          <span>${fields.longitude.toFixed(4)}&deg;</span>
        </div>
        <div style="border-top:1px solid #1e2733;margin-top:6px;padding-top:5px;
                    color:${color};font-size:0.85rem;font-weight:700;letter-spacing:0.03em;">
          ${fields.oil_probability_percent}% &mdash; ${classificationPt(fields.classification)}
        </div>
      </div>`;
  }

  function setResult(text, classification) {
    resultBox.textContent = text;
    resultBox.className = classification || '';
  }

  function addToHistory(fields, source) {
    const list = document.getElementById('history-list');
    const empty = document.getElementById('history-empty');
    if (empty) empty.remove();

    const color = colorForClassification(fields.classification);
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="history-row">
        <span class="history-source" style="color:${sourceColor(source)};">◈ ${source.toUpperCase()}</span>
        <span class="history-prob" style="color:${color};">${fields.oil_probability_percent}% — ${classificationPt(fields.classification)}</span>
      </div>
      <div class="history-coords">${fields.latitude.toFixed(4)}° / ${fields.longitude.toFixed(4)}°</div>`;
    list.insertBefore(item, list.firstChild);
  }

  async function analyzePoint() {
    const payload = {
      latitude: parseFloat(latitudeInput.value),
      longitude: parseFloat(longitudeInput.value),
      methane_ppm: parseFloat(methaneInput.value),
      pressure_hpa: parseFloat(pressureInput.value),
    };

    setResult('Consultando modelo...', '');

    try {
      const response = await fetch(`${API_BASE}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();

      if (pendingMarker) { map.removeLayer(pendingMarker); pendingMarker = null; }

      const fields = { ...payload, ...data };
      const color = colorForClassification(data.classification);
      const marker = L.circleMarker([payload.latitude, payload.longitude], {
        radius: 9,
        color: sourceColor('Manual'),
        fillColor: color,
        fillOpacity: 0.85,
        weight: 2,
      }).bindTooltip(buildTooltipHtml(fields, 'Manual'), { sticky: false }).addTo(map);
      readingMarkers.push(marker);
      addToHistory(fields, 'Manual');

      setResult(
        `PROB. DE PETRÓLEO: ${data.oil_probability_percent}%\nCLASSE: ${classificationPt(data.classification)}\nLAT ${payload.latitude.toFixed(4)}  LON ${payload.longitude.toFixed(4)}`,
        data.classification
      );
    } catch (error) {
      setResult(`ERRO: ${error.message}\nA API está rodando em ${API_BASE}?`, '');
    }
  }

  function plotSatelliteMarker(data) {
    const color = colorForClassification(data.classification);
    const marker = L.circleMarker([data.latitude, data.longitude], {
      radius: 10,
      color: sourceColor('Satélite'),
      fillColor: color,
      fillOpacity: 0.75,
      weight: 3,
    }).bindTooltip(buildTooltipHtml(data, 'Satélite'), { sticky: false }).addTo(map);
    satelliteMarkers.push(marker);
    addToHistory(data, 'Satélite');
  }

  function clearMarkers() {
    if (pendingMarker) { map.removeLayer(pendingMarker); pendingMarker = null; }
    readingMarkers.forEach((m) => map.removeLayer(m));
    readingMarkers.length = 0;
    satelliteMarkers.forEach((m) => map.removeLayer(m));
    satelliteMarkers.length = 0;
    setResult('Aguardando leitura...', '');
    document.getElementById('history-list').innerHTML =
      '<div id="history-empty" class="history-empty">Nenhuma leitura ainda.</div>';
  }

  document.getElementById('analyze-btn').addEventListener('click', analyzePoint);
  document.getElementById('clear-btn').addEventListener('click', clearMarkers);

  // Real-time satellite feed via Server-Sent Events.
  // The browser keeps this connection open; each POST to /satellite is pushed here.
  const satDot = document.getElementById('sat-dot');
  const satLabel = document.getElementById('sat-label');

  const eventSource = new EventSource(`${API_BASE}/satellite/stream`);

  eventSource.onopen = () => {
    satDot.classList.add('connected');
    satLabel.textContent = 'SATÉLITE: CONECTADO';
  };

  eventSource.onerror = () => {
    satDot.classList.remove('connected');
    satLabel.textContent = 'SATÉLITE: AGUARDANDO';
  };

  eventSource.onmessage = (event) => {
    const data = JSON.parse(event.data);
    plotSatelliteMarker(data);
  };
</script>

</body>
</html>
